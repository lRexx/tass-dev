<!-- GUEST UPDATE FORM -->
<div id="UpdateGuest" class="modal fade bd-example-modal-lg" style="top: 150px;" role="dialog">
    <div class="modal-dialog modal-lg" >
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" ng-click="modalConfirmation('closeWindow', 0, null)"><span aria-hidden="true"><i alt="Cerrar" class="glyphicon glyphicon-remove-sign"> </i></span><span class="sr-only">Close</span></button>
                <h3 class="modal-title"><i class="product-success fas fa-user"></i> MODIFICAR <span class="badge badge-default font-size-18px">INVITADO</span>
                    <span> :: EN EL DEPARTAMENTO: <span class="badge badge-default font-size-18px">{{guest.update.depto}}</span></span></h3>
            </div>
            <div class="modal-body" style="overflow-y: scroll;" >
                <!-- FORM CONTAINER-->
                <form class="form-horizontal" name="fUpdateGuest" novalidate>
                    <fieldset>
                    <!-- Form First & Last Name -->
                    <div class="form-group col-md-12" ng-class="
                    {	'has-success':
                        guest.update.fullname!='' && fUpdateGuest.fullname.$valid,
                        'has-error':
                        (guest.update.fullname=='' || guest.update.fullname==undefined) && fUpdateGuest.fullname.$touched,
                    }">
                    <label style="padding-left: 15px;" >Nombres y Apellidos</label>
                        <div class="col-xs-12">
                            <div class="input-group">
                                <span class="input-group-addon"><i class="glyphicon glyphicon-user"></i></span>
                                <input name="fullname" placeholder="Nombres y Apellidos" class="form-control" ng-model="guest.update.fullname" type="text" required autofocus />
                            </div>
                        </div>
                    </div>
                    <!-- Text DNI ng-blur="sysCheck4Duplicates(guest.update.dni, 'dni');" -->
                    <!--<div class="form-group col-md-6" ng-class="
                    {	'has-success':
                        guest.update.dni!='' && fUpdateGuest.dniUser.$valid,
                        'has-error':
                        (guest.update.dni=='' || guest.update.dni==undefined) && fUpdateGuest.dniUser.$touched,
                    }">
                    <label style="padding-left: 15px;">DNI</label>
                        <div class="col-xs-12">
                            <div class="input-group">
                                <span class="input-group-addon"><i class="fas fa-id-card"></i></span>
                                <input name="dniUser" placeholder="Documento de identidad" class="form-control input--dni" ng-model="guest.update.dni"  type="text" ng-keydown="fnLoadPhoneMask();" required autofocus />
                            </div>
                        </div>
                    </div>-->
                    <!-- Text Mail-->
                    <div class="form-group col-md-6" ng-class="
                    {	'has-success':
                        guest.update.mail!='' && fUpdateGuest.emailUser.$valid,
                        'has-warning':
                        (guest.update.mail=='' || guest.update.mail==undefined) && fUpdateGuest.emailUser.$touched,
                    }">
                        <label style="padding-left: 15px;">E-Mail (opcional)</label>
                            <div class="col-xs-12">
                                <div class="input-group">
                                    <span class="input-group-addon"><i class="glyphicon glyphicon-envelope"></i></span>
                                    <input name="emailUser" ng-blur="sysCheck4Duplicates(guest.update.mail, 'mail');" placeholder="E-Mail" class="form-control" ng-model="guest.update.mail"  type="email" autofocus />
                                </div>
                            </div>
                    </div>
                    <!-- Movil Phone-->
                    <div class="form-group col-md-6" ng-class="{
                    'has-success':
                        guest.update.phoneMovilNumberGuest!='' && guest.update.phoneMovilNumberGuest!=null  && fUpdateGuest.phoneMovilNumberGuest.$valid,
                    'has-warning':
                        !guest.update.phoneMovilNumberGuest && tenant.update.phonelocalNumberUser,
                    'has-error':
                        !guest.update.phoneMovilNumberGuest && !tenant.update.phonelocalNumberUser && fUpdateGuest.phoneMovilNumberGuest.$touched,
                    }">
                        <label style="padding-left: 15px;">Teléfono Móvil (Opcional)</label>

                        <div class="col-xs-12">
                            <div class="input-group">
                                <!-- Country Code -->
                                <div class="input-group-btn" style="width: 100px;">
                                    <ui-select
                                        class="ui-select-bootstrap-phone"
                                        name="countryCode"
                                        ng-model="select.phoneCountryMovil.selected"
                                        search-enabled="true">
                                        <ui-select-match allow-clear="false"><span class="country-flag"><img
    ng-src="https://flagcdn.com/24x18/{{$select.selected.isoCode | lowercase}}.png"
    width="18"
    style="margin-right:5px;"> {{ $select.selected.phoneCode }}</ui-select-match>
                                        <ui-select-choices repeat="item in countryPhoneCodesList | filter: $select.search">
                                            <div ng-bind-html="item.phoneCode | highlight: $select.search"></div>
                                            <small  ng-bind-html="item.countryName | highlight: $select.search" class="label label-default">
                                                <img ng-src="https://flagcdn.com/24x18/{{item.isoCode | lowercase}}.png" width="18" style="margin-right:5px;"> {{item.countryName}}
                                            </small>
                                        </ui-select-choices>
                                    </ui-select>
                                </div>
                                <!-- Phone Prefix number -->
                                <input
                                    name="phoneMovilPrefix"
                                    ng-model="guest.update.phoneMovilPrefixNumber"
                                    type="text"
                                    class="form-control input-phone-prefix"
                                    ng-minlength="2"
                                    ng-maxlength="4"
                                    ng-keydown="fnLoadPhoneMask();"
                                    placeholder="Pref."
                                    style="width: 28.4% !important;"
                                />
                                <!-- Phone number -->
                                <input
                                    name="phoneMovilNumberGuest"
                                    ng-model="guest.update.phoneMovilNumberGuest"
                                    type="text"
                                    class="form-control input-movil"
                                    ng-minlength="8"
                                    ng-keydown="fnLoadPhoneMask();"
                                    placeholder="Num. de teléfono"
                                    style="width: 71.6% !important;"
                                />
                            <!-- Icon on the right -->
                            <span class="input-group-addon">
                                <i class="glyphicon glyphicon-earphone"></i>
                            </span>
                            </div>
                        </div>
                    </div>
                    <div ng-if="sysDNIRegistered || sysEmailRegistered" class="form-group row n-margin-t n-margin-b">
                        <div ng-if="sysDNIRegistered" class="form-group n-margin-t n-margin-b" ng-class="{
                            'col-md-6':
                                sysDNIRegistered && sysEmailRegistered,
                            'col-md-12':
                                sysDNIRegistered && !sysEmailRegistered,
                                }">
                            <div class="alert alert-danger" role="alert">
                                <strong><i class="fas fa-ban">&nbsp </i>ATENCION: </strong>el numero de documento ingresado se encuentra registrado.
                                <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                                    <!--<span aria-hidden="true">&times;</span> -->
                                </button>
                            </div>
                        </div>
                    </div>
                    </fieldset>
                </form>
                <div class="clearfix"> </div>
            </div>
            <!-- Actions Button -->
            <div class="modal-footer">
                <div class="row">
                    <div class="col-xs-12 col-sm-12 col-md-6 pull-right">
                        <button type="submit" ng-click="switchBuildingFn('updateGuest', guest.update)" ng-disabled="fUpdateGuest.$invalid" class="btn btn-labeled btn-success">
                            <span class="btn-label"><i class="glyphicon glyphicon-send"></i> </span>Actualizar</button>
                        <a ng-click="modalConfirmation('closeWindow', 0, null)" type="button" class="btn btn-labeled btn-danger">
                            <span class="btn-label"><i class="glyphicon glyphicon-remove"></i></span>Cancelar</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
